<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Terapeuta - AgendaiFisio</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="dashboards.css">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar Padrão -->
        <aside class="sidebar">
            <div class="sidebar-logo">🌿 AgendaiFisio</div>
            <nav>
                <a href="dashboards.html">📊 Dashboard</a>
                <a href="TelaTerapeuta.html">📅 Minha Agenda</a>
                <a href="pacientesTerapeuta.html" class="active">👥 Meus Pacientes</a>
            </nav>
            <div class="sidebar-user">
                <strong>Davi Gusmão</strong>
                <p>Terapeuta</p>
            </div>
        </aside>

        <!-- Área Principal -->
        <main class="main-content">
            
        </main>
    </div>

    <!-- MODAL DE PRONTUÁRIO PREMIUM -->
    <dialog id="modalProntuario" class="prontuario-modal">
        <div class="modal-header-clean">
            <div>
                <span class="paciente-tag">Paciente</span>
                <h2 id="nomePacienteProntuario">Nome do Paciente</h2>
            </div>
            <button onclick="document.getElementById('modalProntuario').close()" class="btn-close-icon">×</button>
        </div>

        <div class="modal-body-prontuario">
            <div class="info-row">
                <div class="info-group">
                    <label>Última Sessão</label>
                    <span>15 Abr 2026</span>
                </div>
                <div class="info-group">
                    <label>Status</label>
                    <span class="status-verde">● Em acompanhamento</span>
                </div>
            </div>

            <div class="campo-evolucao">
                <label for="textoProntuario">Evolução Clínica / Notas da Sessão</label>
                <textarea id="textoProntuario" class="input-prontuario"
                    placeholder="Descreva aqui o comportamento, falas relevantes e intervenções..."></textarea>
            </div>

            <div class="modal-footer-flex">
                <button onclick="document.getElementById('modalProntuario').close()"
                    class="btn-descartar">Descartar</button>
                <button id="btnSalvarProntuario" class="btn-confirmar-prontuario">Salvar Evolução</button>
            </div>
        </div>
    </dialog>

    <!-- MODAL DE BLOQUEIO DE AGENDA -->
    <dialog id="modalAgenda" class="modal-moderno">
        <div class="modal-header">
            <h2>Gerenciar Disponibilidade</h2>
        </div>
        <div class="modal-body">
            <div class="passo">
                <label>Data para Bloqueio</label>
                <input type="date" id="dataBloqueio" class="input-data">
            </div>
            <div class="passo">
                <label>Selecione os horários para bloquear/liberar</label>
                <div id="containerHorarios" class="horarios-grid"></div>
            </div>
            <div class="botoes-footer">
                <button onclick="document.getElementById('modalAgenda').close()" class="btn-cancelar">Concluir</button>
            </div>
        </div>
    </dialog>

    <script src="pacientesTerapeuta.js"></script>
</body>

</html>

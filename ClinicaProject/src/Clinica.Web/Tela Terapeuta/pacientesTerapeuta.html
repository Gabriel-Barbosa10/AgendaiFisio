<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Terapeuta - AgendaiFisio</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="dashboards.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar Padrão -->
        <aside class="sidebar">
            <div class="sidebar-logo">🌿 AgendaiFisio</div>
            <nav>
                <a href="dashboards.html">📊 Dashboard</a>
                <a href="TelaTerapeuta.html">📅 Minha Agenda</a>
                <a href="pacientesTerapeuta.html" class="active">👥 Meus Pacientes</a>
            </nav>
            <div class="sidebar-user">
                <strong>Arnaldo Candido</strong>
                <p>Terapeuta</p>
            </div>
        </aside>

        <!-- Área Principal -->
        <main class="main-content">
            <header class="main-header">
                <div class="title-group">
                    <h1>Meus Pacientes</h1>
                    <p>Gerencie seus pacientes e prontuários.</p>
                </div>
                <div class="header-actions">
                    <button class="btn-novo" onclick="document.getElementById('modalNovoPaciente').showModal()">➕ Novo Paciente</button>
                </div>
            </header>

            <!-- Lista de Pacientes -->
            <section class="consultas-section">
                <div class="busca-container" style="margin-bottom: 2.5rem; width: 100%; max-width: 450px; padding: 14px 20px; border-radius: 16px;">
                    <span class="busca-icone" style="color: #94a3b8;">🔍</span>
                    <input type="text" id="inputBuscaPaciente" placeholder="Buscar paciente por nome..." style="border: none; outline: none; width: 100%; font-family: inherit; font-size: 1rem; font-weight: 500; color: #1e293b; background: transparent;">
                </div>
                <div class="consultas-grid" id="gridPacientes">
                    <!-- Cards injetados via JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL DE PRONTUÁRIO PREMIUM -->
    <dialog id="modalProntuario" class="prontuario-modal">
        <div class="modal-header-clean">
            <div>
                <span class="paciente-tag">Paciente</span>
                <h2 id="nomePacienteProntuario">Nome do Paciente</h2>
            </div>
            <button onclick="document.getElementById('modalProntuario').close()" class="btn-close-icon">×</button>
        </div>

        <div class="modal-body-prontuario">
            <div class="info-row">
                <div class="info-group">
                    <label>Última Sessão</label>
                    <span>15 Abr 2026</span>
                </div>
                <div class="info-group">
                    <label>Status</label>
                    <span class="status-verde">● Em acompanhamento</span>
                </div>
            </div>

            <div class="campo-evolucao">
                <label for="textoProntuario">Evolução Clínica / Notas da Sessão</label>
                <textarea id="textoProntuario" class="input-prontuario"
                    placeholder="Descreva aqui o comportamento, falas relevantes e intervenções..."></textarea>
            </div>

            <div class="modal-footer-flex">
                <button onclick="document.getElementById('modalProntuario').close()"
                    class="btn-descartar">Descartar</button>
                <button id="btnSalvarProntuario" class="btn-confirmar-prontuario">Salvar Evolução</button>
            </div>
        </div>
    </dialog>

    <!-- MODAL DE NOVO PACIENTE -->
    <dialog id="modalNovoPaciente" class="prontuario-modal">
        <div class="modal-header-clean">
            <div>
                <span class="paciente-tag" style="background: #e0f2fe; color: #0284c7;">Cadastro</span>
                <h2>Novo Paciente</h2>
            </div>
            <button type="button" onclick="document.getElementById('modalNovoPaciente').close()" class="btn-close-icon">×</button>
        </div>
        <div class="modal-body-prontuario">
            <form id="formNovoPaciente" onsubmit="salvarNovoPaciente(event)">
                <div class="campo-evolucao" style="margin-bottom: 1.5rem;">
                    <label for="novoPacienteNome">Nome Completo</label>
                    <input type="text" id="novoPacienteNome" class="input-prontuario" style="min-height: 55px; padding: 0 15px; border-radius: 14px; font-weight: 600; font-size: 1rem;" placeholder="Ex: Maria Antonieta" required>
                </div>
                <div class="campo-evolucao" style="margin-bottom: 2.5rem;">
                    <label for="novoPacienteTelefone">Telefone / Contato</label>
                    <input type="tel" id="novoPacienteTelefone" class="input-prontuario" style="min-height: 55px; padding: 0 15px; border-radius: 14px; font-weight: 600; font-size: 1rem;" placeholder="(00) 00000-0000" maxlength="15" inputmode="numeric" pattern="[0-9()\s\-]*" required>
                </div>
                <div class="modal-footer-flex">
                    <button type="button" onclick="document.getElementById('modalNovoPaciente').close()" class="btn-descartar">Cancelar</button>
                    <button type="submit" class="btn-confirmar-prontuario">Salvar Paciente</button>
                </div>
            </form>
        </div>
    </dialog>

    <script src="mobile.js"></script>
    <script src="pacientesTerapeuta.js"></script>
</body>

</html>
